name: test-ota-contract-matrix

on:
  workflow_dispatch:
    inputs:
      ota_repository:
        description: Ota source repository to build for this matrix run
        required: false
        default: ota-run/ota
      ota_ref:
        description: Ota branch, tag, or commit to build for this matrix run
        required: false
        default: 1.6.18-implementation
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  contract-matrix:
    name: Ota Contract Matrix (${{ matrix.mode_label }} - ${{ matrix.os_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: pre_run
            os: ubuntu-latest
            os_name: ubuntu
            mode_label: native+container-pre-run
            workflow: verify
            runtime_proof: false
          - lane: pre_run
            os: macos-latest
            os_name: macos
            mode_label: native+container-pre-run
            workflow: verify
            runtime_proof: false
          - lane: pre_run
            os: windows-latest
            os_name: windows
            mode_label: native+container-pre-run
            workflow: verify
            runtime_proof: false
          - lane: runtime_proof
            os: ubuntu-latest
            os_name: ubuntu
            mode_label: container-runtime-proof
            workflow: app:docker
            runtime_proof: true
    env:
      PUPPETEER_SKIP_DOWNLOAD: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js 20.20.2
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2

      - name: Install ota from source
        uses: ota-run/ota/.github/actions/install-ota-from-source@v1.6.16
        with:
          repository: ${{ github.event.inputs.ota_repository || 'ota-run/ota' }}
          ref: ${{ github.event.inputs.ota_ref || '1.6.18-implementation' }}

      - name: Activate pnpm for native pressure lane
        if: ${{ matrix.lane == 'pre_run' && matrix.os_name == 'ubuntu' }}
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.26.0 --activate

      - name: Contract pre-run gates (JSON)
        shell: bash
        run: |
          set +e
          matrix_dir=".ota/ci/matrix-${{ matrix.os_name }}-${{ matrix.lane }}"
          mkdir -p "${matrix_dir}"

          ota validate --json . | tee "${matrix_dir}/validate.json"
          validate_status=${PIPESTATUS[0]}

          ota tasks --json . | tee "${matrix_dir}/tasks.json"
          tasks_status=${PIPESTATUS[0]}

          ota execution topology --json . | tee "${matrix_dir}/execution-topology.json"
          topology_status=${PIPESTATUS[0]}

          ota run verify:ci:full --dry-run --json . | tee "${matrix_dir}/run-verify-ci-full-dry-run.json"
          run_status=${PIPESTATUS[0]}

          ota up --dry-run --json . | tee "${matrix_dir}/up-dry-run.json"
          up_status=${PIPESTATUS[0]}

          ota up --workflow verify --container --dry-run --json . | tee "${matrix_dir}/up-verify-container-dry-run.json"
          up_verify_container_status=${PIPESTATUS[0]}

          node - "${matrix_dir}/up-verify-container-dry-run.json" <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          if (!report.dry_run || !report.status) {
            console.error(JSON.stringify(report, null, 2));
            process.exit(1);
          }
          NODE

          {
            echo "validate_status=${validate_status}"
            echo "tasks_status=${tasks_status}"
            echo "topology_status=${topology_status}"
            echo "run_status=${run_status}"
            echo "up_status=${up_status}"
            echo "up_verify_container_status=${up_verify_container_status}"
          } > "${matrix_dir}/status.env"

          if [ "${up_verify_container_status}" -ne 0 ]; then
            echo "container dry-run blocked on this host (expected on non-Ubuntu hosted runners)"
          fi

          if [ "${validate_status}" -ne 0 ] || [ "${tasks_status}" -ne 0 ] || [ "${topology_status}" -ne 0 ] || [ "${run_status}" -ne 0 ] || [ "${up_status}" -ne 0 ]; then
            exit 1
          fi

      - name: Execute verify workflow (native)
        if: ${{ matrix.lane == 'pre_run' && matrix.os_name == 'ubuntu' }}
        timeout-minutes: 45
        shell: bash
        run: ota up --workflow verify --native --stream .

      - name: Execute native smoke tasks (cross-OS non-Ubuntu)
        if: ${{ matrix.lane == 'pre_run' && matrix.os_name != 'ubuntu' }}
        timeout-minutes: 45
        shell: bash
        run: ota run lint --native --stream .

      - name: Execute verify workflow (container)
        if: ${{ matrix.lane == 'pre_run' && matrix.os_name == 'ubuntu' }}
        timeout-minutes: 45
        shell: bash
        run: ota up --workflow verify --container --stream .

      - name: Dry-run all non-internal tasks (native coverage lane)
        if: ${{ matrix.lane == 'pre_run' && matrix.os_name == 'ubuntu' }}
        timeout-minutes: 120
        shell: bash
        run: |
          set -euo pipefail
          matrix_dir=".ota/ci/matrix-${{ matrix.os_name }}-${{ matrix.lane }}"
          chmod -R u+w packages/server/dist packages/components/dist packages/ui/dist 2>/dev/null || true
          rm -rf packages/server/dist packages/components/dist packages/ui/dist 2>/dev/null || true
          ota tasks --json . > "${matrix_dir}/ota-tasks-all.json"
          jq -c '
            .tasks[]
            | select((.internal // false) == false)
            | {
                name: .name,
                supports_native: (
                  if (.modes | type) == "array" then
                    any(.modes[]?; .mode == "native")
                  else
                    ((.default_mode // "native") == "native")
                  end
                ),
                runtime_native: (.has_runtime // false)
              }
            | select(.supports_native)
          ' "${matrix_dir}/ota-tasks-all.json" > "${matrix_dir}/ota-non-internal-native.jsonl"
          while IFS= read -r task_line; do
            task_name="$(jq -r '.name' <<<"$task_line")"
            runtime_native="$(jq -r '.runtime_native' <<<"$task_line")"
            echo ">>> [native] ${task_name} (runtime=${runtime_native})"
            if [ "$runtime_native" = "true" ]; then
              ota run --native --dry-run --json "$task_name" .
            else
              ota run --native --dry-run --json "$task_name" .
            fi
          done < "${matrix_dir}/ota-non-internal-native.jsonl"

      - name: Dry-run all non-internal tasks (container coverage lane)
        if: ${{ matrix.lane == 'pre_run' && matrix.os_name == 'ubuntu' }}
        timeout-minutes: 120
        shell: bash
        run: |
          set -euo pipefail
          matrix_dir=".ota/ci/matrix-${{ matrix.os_name }}-${{ matrix.lane }}"
          ota tasks --json . > "${matrix_dir}/ota-tasks-all.json"
          jq -c '
            .tasks[]
            | select((.internal // false) == false)
            | {
                name: .name,
                supports_container: (
                  if (.modes | type) == "array" then
                    any(.modes[]?; .mode == "container")
                  else
                    ((.default_mode // "native") == "container")
                  end
                ),
                runtime_container: (.has_runtime // false)
              }
            | select(.supports_container)
          ' "${matrix_dir}/ota-tasks-all.json" > "${matrix_dir}/ota-non-internal-container.jsonl"
          while IFS= read -r task_line; do
            task_name="$(jq -r '.name' <<<"$task_line")"
            runtime_container="$(jq -r '.runtime_container' <<<"$task_line")"
            echo ">>> [container] ${task_name} (runtime=${runtime_container})"
            if [ "$runtime_container" = "true" ]; then
              ota run --container --dry-run --json "$task_name" .
            else
              ota run --container --dry-run --json "$task_name" .
            fi
          done < "${matrix_dir}/ota-non-internal-container.jsonl"

      - name: Runtime proof lane (JSON)
        if: ${{ matrix.runtime_proof }}
        shell: bash
        run: |
          set +e
          matrix_dir=".ota/ci/matrix-${{ matrix.os_name }}-${{ matrix.lane }}"
          ota proof runtime --json --workflow "${{ matrix.workflow }}" . | tee "${matrix_dir}/proof-runtime.json"
          proof_status=${PIPESTATUS[0]}
          echo "proof_status=${proof_status}" >> "${matrix_dir}/status.env"
          [ "${proof_status}" -eq 0 ]

      - name: Upload matrix artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ota-contract-${{ matrix.os_name }}-${{ matrix.lane }}
          if-no-files-found: ignore
          path: |
            .ota/ci/matrix-${{ matrix.os_name }}-${{ matrix.lane }}/
            .ota/proof/
