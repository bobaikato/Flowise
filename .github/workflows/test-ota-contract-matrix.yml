name: test-ota-contract-matrix

on:
  workflow_dispatch:
    inputs:
      ota_repository:
        description: Ota source repository to build for this matrix run
        required: false
        default: ota-run/ota
      ota_ref:
        description: Ota branch, tag, or commit to build for this matrix run
        required: false
        default: bobai/gap3-smoke-verdict-contract
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  contract-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: pre_run
            workflow: verify
            runtime_proof: false
          - lane: runtime_proof
            workflow: app:docker
            runtime_proof: true
    env:
      PUPPETEER_SKIP_DOWNLOAD: true
    steps:
      - uses: actions/checkout@v6

      - name: Install ota from source
        uses: ota-run/ota/.github/actions/install-ota-from-source@v1.6.16
        with:
          repository: ${{ github.event.inputs.ota_repository || 'ota-run/ota' }}
          ref: ${{ github.event.inputs.ota_ref || 'bobai/gap3-smoke-verdict-contract' }}

      - name: Contract pre-run gates (JSON)
        run: |
          set +e
          matrix_dir=".ota/ci/matrix-${{ matrix.lane }}"
          mkdir -p "${matrix_dir}"

          ota validate --json . | tee "${matrix_dir}/validate.json"
          validate_status=${PIPESTATUS[0]}

          ota tasks --json . | tee "${matrix_dir}/tasks.json"
          tasks_status=${PIPESTATUS[0]}

          ota execution topology --json . | tee "${matrix_dir}/execution-topology.json"
          topology_status=${PIPESTATUS[0]}

          ota run verify:ci:full --dry-run --json . | tee "${matrix_dir}/run-verify-ci-full-dry-run.json"
          run_status=${PIPESTATUS[0]}

          ota up --dry-run --json . | tee "${matrix_dir}/up-dry-run.json"
          up_status=${PIPESTATUS[0]}

          ota up --workflow verify --container --dry-run --json . | tee "${matrix_dir}/up-verify-container-dry-run.json"
          up_verify_container_status=${PIPESTATUS[0]}

          {
            echo "validate_status=${validate_status}"
            echo "tasks_status=${tasks_status}"
            echo "topology_status=${topology_status}"
            echo "run_status=${run_status}"
            echo "up_status=${up_status}"
            echo "up_verify_container_status=${up_verify_container_status}"
          } > "${matrix_dir}/status.env"

          if [ "${validate_status}" -ne 0 ] || [ "${tasks_status}" -ne 0 ] || [ "${topology_status}" -ne 0 ] || [ "${run_status}" -ne 0 ] || [ "${up_status}" -ne 0 ] || [ "${up_verify_container_status}" -ne 0 ]; then
            exit 1
          fi

      - name: Runtime proof lane (JSON)
        if: ${{ matrix.runtime_proof }}
        run: |
          set +e
          matrix_dir=".ota/ci/matrix-${{ matrix.lane }}"
          ota proof runtime --json --workflow "${{ matrix.workflow }}" . | tee "${matrix_dir}/proof-runtime.json"
          proof_status=${PIPESTATUS[0]}
          echo "proof_status=${proof_status}" >> "${matrix_dir}/status.env"
          [ "${proof_status}" -eq 0 ]

      - name: Upload matrix artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ota-contract-${{ matrix.lane }}
          if-no-files-found: ignore
          path: |
            .ota/ci/matrix-${{ matrix.lane }}/
            .ota/proof/
