version: 1
project:
  name: Flowise
  description: Flowise monorepo readiness slice covering the documented pnpm contributor path, root CI verification surface, and Docker self-host/service workflows
  type: application
metadata:
  ota:
    minimum_version: "1.6.16"
execution:
  default_context: host
  contexts:
    host:
      backend: native
    app:
      backend: container
      lifecycle: ephemeral
      container:
        image: node:20-bookworm
        engines:
          - docker
          - podman
      attachments:
        isolated_paths:
          - node_modules
          - .pnpm-store
          - .turbo
          - packages/server/dist
toolchains:
  node:
    provider: corepack
    version: "^20.20.2"
    package_managers:
      pnpm: "10.26.0"
tools:
  docker:
    version: "*"
    required: false
surfaces:
  api:
    kind: http
    port: 3000
    path: /api/v1/ping
    readiness:
      kind: http
      method: GET
      path: /api/v1/ping
      success:
        status:
          - 200
      body:
        contains: "pong"
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 15s
  app:
    kind: http
    port: 3000
    path: /
    readiness:
      kind: http
      method: GET
      path: /
      headers:
        Accept: text/html
      success:
        status:
          - 200
      body:
        contains: "<!DOCTYPE html>"
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 20s
  dev-ui:
    kind: http
    port: 8080
    path: /
    readiness:
      kind: http
      method: GET
      path: /
      headers:
        Accept: text/html
      success:
        status:
          - 200
      body:
        contains: "<!DOCTYPE html>"
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 20s
  worker:
    kind: http
    port: 5566
    path: /healthz
    readiness:
      kind: http
      method: GET
      path: /healthz
      success:
        status:
          - 200
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 20s
tasks:
  setup:env:server:
    context: host
    description: Create the server env file from template when missing
    notes: |
      This follows the contributor setup in README/CONTRIBUTING.
      It only copies `packages/server/.env.example` when `packages/server/.env` is absent.
    category: setup
    action:
      kind: copy_if_missing
      from: packages/server/.env.example
      to: packages/server/.env
    effects:
      writes:
        - packages/server/.env
  setup:env:ui:
    context: host
    description: Create the UI env file from template when missing
    notes: |
      This follows the contributor setup in README/CONTRIBUTING.
      It only copies `packages/ui/.env.example` when `packages/ui/.env` is absent.
    category: setup
    action:
      kind: copy_if_missing
      from: packages/ui/.env.example
      to: packages/ui/.env
    effects:
      writes:
        - packages/ui/.env
  setup:env:docker:
    context: host
    description: Create docker env file from template when missing
    notes: |
      This follows `docker/README.md`.
      It only copies `docker/.env.example` when `docker/.env` is absent.
    category: setup
    action:
      kind: copy_if_missing
      from: docker/.env.example
      to: docker/.env
    effects:
      writes:
        - docker/.env
  setup:env:docker:defaults:
    context: host
    description: Ensure Docker env has required persistence path defaults
    notes: |
      This seeds default paths required by Flowise Docker startup when they are absent.
      It preserves existing values and only appends missing keys.
    category: setup
    run: |
      sh -c 'if ! grep -Eq "^[[:space:]]*DATABASE_PATH=" docker/.env; then echo "DATABASE_PATH=/root/.flowise" >> docker/.env; fi
      if ! grep -Eq "^[[:space:]]*LOG_PATH=" docker/.env; then echo "LOG_PATH=/root/.flowise/logs" >> docker/.env; fi
      if ! grep -Eq "^[[:space:]]*SECRETKEY_PATH=" docker/.env; then echo "SECRETKEY_PATH=/root/.flowise" >> docker/.env; fi
      if ! grep -Eq "^[[:space:]]*BLOB_STORAGE_PATH=" docker/.env; then echo "BLOB_STORAGE_PATH=/root/.flowise/storage" >> docker/.env; fi'
    depends_on:
      - setup:env:docker
    effects:
      writes:
        - docker/.env
  setup:env:worker:
    context: host
    description: Create worker docker env file from template when missing
    notes: |
      This follows `docker/worker/README.md`.
      It only copies `docker/worker/.env.example` when `docker/worker/.env` is absent.
    category: setup
    action:
      kind: copy_if_missing
      from: docker/worker/.env.example
      to: docker/worker/.env
    effects:
      writes:
        - docker/worker/.env
  install:
    context: host
    description: Install monorepo dependencies with pnpm
    notes: |
      This maps directly to the root setup path in README and CI.
    category: setup
    run: corepack pnpm@10.26.0 install
    execution:
      default_mode: native
      modes:
        native:
          context: host
          run: corepack pnpm@10.26.0 install
        container:
          context: app
          run: corepack pnpm@10.26.0 install
    requirements:
      toolchains:
        - node
    effects:
      network: true
  lint:
    context: host
    description: Run repository lint checks
    notes: |
      This maps directly to root CI lint execution.
    category: test
    run: corepack pnpm@10.26.0 lint
    execution:
      default_mode: native
      modes:
        native:
          context: host
          run: corepack pnpm@10.26.0 lint
        container:
          context: app
          run: corepack pnpm@10.26.0 lint
    requirements:
      toolchains:
        - node
      checks:
        - workspace-dependencies-installed
    depends_on:
      - install
  build:
    context: host
    description: Build all monorepo packages through turbo
    notes: |
      This maps to root contributor and CI build commands.
    category: build
    run: corepack pnpm@10.26.0 build
    execution:
      default_mode: native
      modes:
        native:
          context: host
          run: corepack pnpm@10.26.0 build
        container:
          context: app
          run: corepack pnpm@10.26.0 build
    env:
      NODE_OPTIONS: "--max_old_space_size=4096"
    requirements:
      toolchains:
        - node
      checks:
        - workspace-dependencies-installed
    depends_on:
      - install
  typecheck:
    context: host
    description: Run compile-time typechecking surfaces through package build scripts
    notes: |
      Flowise does not expose a standalone `typecheck` script at the root.
      The package build scripts are the authoritative TypeScript compile/typecheck surface.
    category: test
    run: corepack pnpm@10.26.0 --filter ./packages/server build && corepack pnpm@10.26.0 --filter flowise-components build && corepack pnpm@10.26.0 --filter @flowiseai/agentflow build && corepack pnpm@10.26.0 --filter @flowiseai/observe build && corepack pnpm@10.26.0 --filter flowise-api build
    execution:
      default_mode: native
      modes:
        native:
          context: host
          run: corepack pnpm@10.26.0 --filter ./packages/server build && corepack pnpm@10.26.0 --filter flowise-components build && corepack pnpm@10.26.0 --filter @flowiseai/agentflow build && corepack pnpm@10.26.0 --filter @flowiseai/observe build && corepack pnpm@10.26.0 --filter flowise-api build
        container:
          context: app
          run: corepack pnpm@10.26.0 --filter ./packages/server build && corepack pnpm@10.26.0 --filter flowise-components build && corepack pnpm@10.26.0 --filter @flowiseai/agentflow build && corepack pnpm@10.26.0 --filter @flowiseai/observe build && corepack pnpm@10.26.0 --filter flowise-api build
    env:
      NODE_OPTIONS: "--max_old_space_size=4096"
    requirements:
      toolchains:
        - node
      checks:
        - workspace-dependencies-installed
    depends_on:
      - install
  test:
    context: host
    description: Run monorepo test surfaces through turbo
    notes: |
      This maps directly to root contributor and CI test shape.
    category: test
    run: corepack pnpm@10.26.0 test
    execution:
      default_mode: native
      modes:
        native:
          context: host
          run: corepack pnpm@10.26.0 test
        container:
          context: app
          run: corepack pnpm@10.26.0 test
    requirements:
      toolchains:
        - node
      checks:
        - workspace-dependencies-installed
    depends_on:
      - install
  test:coverage:
    context: host
    description: Run monorepo test coverage surface
    notes: |
      This maps directly to the root CI coverage command in `.github/workflows/main.yml`.
    category: test
    run: corepack pnpm@10.26.0 test:coverage
    execution:
      default_mode: native
      modes:
        native:
          context: host
          run: corepack pnpm@10.26.0 test:coverage
        container:
          context: app
          run: corepack pnpm@10.26.0 test:coverage
    requirements:
      toolchains:
        - node
      checks:
        - workspace-dependencies-installed
    depends_on:
      - install
  verify:ci:
    context: host
    description: Run the root CI verification core sequence
    notes: |
      This matches the core verification chain in `.github/workflows/main.yml`:
      `pnpm lint`, `pnpm build`, then `pnpm test:coverage`.
      Use `verify:ci:full` to include the Cypress lane from the same workflow.
    category: test
    run: corepack pnpm@10.26.0 lint && corepack pnpm@10.26.0 build && corepack pnpm@10.26.0 test:coverage
    execution:
      default_mode: native
      modes:
        native:
          context: host
          run: corepack pnpm@10.26.0 lint && corepack pnpm@10.26.0 build && corepack pnpm@10.26.0 test:coverage
        container:
          context: app
          run: corepack pnpm@10.26.0 lint && corepack pnpm@10.26.0 build && corepack pnpm@10.26.0 test:coverage
    env:
      NODE_OPTIONS: "--max_old_space_size=4096"
    requirements:
      toolchains:
        - node
      checks:
        - workspace-dependencies-installed
    depends_on:
      - install
  verify:ci:full:
    context: host
    description: Run a CLI-equivalent full CI verification path including Cypress
    notes: |
      This mirrors `.github/workflows/main.yml` core steps and adds the
      repo-local Cypress CLI lane (`packages/server:cypress:ci`) as the
      non-Action equivalent for end-to-end verification.
    category: test
    run: corepack pnpm@10.26.0 lint && corepack pnpm@10.26.0 build && corepack pnpm@10.26.0 test:coverage && corepack pnpm@10.26.0 cypress install && corepack pnpm@10.26.0 --filter ./packages/server cypress:ci
    execution:
      default_mode: native
      modes:
        native:
          context: host
          run: corepack pnpm@10.26.0 lint && corepack pnpm@10.26.0 build && corepack pnpm@10.26.0 test:coverage && corepack pnpm@10.26.0 cypress install && corepack pnpm@10.26.0 --filter ./packages/server cypress:ci
        container:
          context: app
          run: corepack pnpm@10.26.0 lint && corepack pnpm@10.26.0 build && corepack pnpm@10.26.0 test:coverage && corepack pnpm@10.26.0 cypress install && corepack pnpm@10.26.0 --filter ./packages/server cypress:ci
    env:
      NODE_OPTIONS: "--max_old_space_size=4096"
      PUPPETEER_SKIP_DOWNLOAD: "true"
    requirements:
      toolchains:
        - node
      checks:
        - workspace-dependencies-installed
    depends_on:
      - install
    effects:
      network: true
  start:
    context: host
    description: Start Flowise production server from built artifacts
    notes: |
      This is the documented local production startup path (`pnpm start`).
    category: dev
    run: corepack pnpm@10.26.0 start
    requirements:
      toolchains:
        - node
      checks:
        - workspace-dependencies-installed
        - server-env-configured
    depends_on:
      - build
      - setup:env:server
    runtime:
      kind: service
      surfaces:
        api: {}
        app:
          project:
            host:
              primary: true
  dev:
    context: host
    description: Start Flowise monorepo development servers
    notes: |
      This maps directly to the documented contributor development loop (`pnpm dev`).
      README documents UI at port 8080 and API server at port 3000.
    category: dev
    run: corepack pnpm@10.26.0 dev
    requirements:
      toolchains:
        - node
      checks:
        - workspace-dependencies-installed
        - server-env-configured
        - ui-env-configured
    depends_on:
      - install
      - setup:env:server
      - setup:env:ui
    runtime:
      kind: service
      surfaces:
        api: {}
        dev-ui:
          project:
            host:
              primary: true
  dev:docker:
    context: host
    description: Run Flowise from the documented Docker compose stack
    notes: |
      This follows the `docker/README.md` path: `cd docker && docker compose up`.
    category: dev
    run: cd docker && docker compose up
    requirements:
      tools:
        docker: "*"
      checks:
        - docker-env-configured
    depends_on:
      - setup:env:docker:defaults
    effects:
      network: true
      external_state:
        - docker
    runtime:
      kind: service
      surfaces:
        api: {}
        app:
          project:
            host:
              primary: true
  dev:docker:queue:
    context: host
    description: Run Flowise queue mode from prebuilt Docker images
    notes: |
      This follows `docker/README.md` queue mode path:
      `docker compose -f docker-compose-queue-prebuilt.yml up`.
    category: dev
    run: cd docker && docker compose -f docker-compose-queue-prebuilt.yml up
    requirements:
      tools:
        docker: "*"
      checks:
        - docker-env-configured
    depends_on:
      - setup:env:docker:defaults
    effects:
      network: true
      external_state:
        - docker
    runtime:
      kind: service
      surfaces:
        api: {}
        app:
          project:
            host:
              primary: true
  dev:docker:worker:
    context: host
    description: Run the standalone Flowise worker container compose stack
    notes: |
      This follows `docker/worker/README.md` path:
      `cd docker/worker && docker compose up`.
    category: dev
    run: cd docker/worker && docker compose up
    requirements:
      tools:
        docker: "*"
      checks:
        - worker-env-configured
    depends_on:
      - setup:env:worker
    effects:
      network: true
      external_state:
        - docker
    runtime:
      kind: service
      surfaces:
        worker:
          project:
            host:
              primary: true
workflows:
  default: app
  verify:
    intent: ci_verification
    description: Root CI verification path for Flowise
    notes: |
      This aligns with `.github/workflows/main.yml`:
      install, lint, build, coverage tests, then Cypress verification through
      the repo-local CLI-equivalent Cypress lane.
    setup:
      task: install
    run:
      task: verify:ci:full
  app:
    intent: local_development
    description: Canonical Flowise contributor development workflow
    notes: |
      This follows README/CONTRIBUTING setup and development run path.
    prepare:
      task: setup:env:server
    setup:
      task: install
    run:
      task: dev
    readiness:
      surfaces:
        - api
        - dev-ui
    exposes:
      - surface: dev-ui
      - surface: api
  app:prod:
    intent: local_development
    description: Local production startup workflow from built artifacts
    notes: |
      This follows the documented `pnpm build` then `pnpm start` flow.
    prepare:
      task: setup:env:server
    setup:
      task: build
    run:
      task: start
    readiness:
      surfaces:
        - api
        - app
    exposes:
      - surface: app
      - surface: api
  app:docker:
    intent: packaged_runtime
    description: Docker compose self-host workflow for Flowise
    notes: |
      This follows `docker/README.md` default compose path.
    prepare:
      task: setup:env:docker
    run:
      task: dev:docker
    readiness:
      surfaces:
        - api
        - app
    exposes:
      - surface: app
      - surface: api
  app:docker:queue:
    intent: packaged_runtime
    description: Docker queue-mode workflow for Flowise main and worker services
    notes: |
      This follows `docker/README.md` prebuilt queue compose path.
    prepare:
      task: setup:env:docker
    run:
      task: dev:docker:queue
    readiness:
      surfaces:
        - api
        - app
    exposes:
      - surface: app
      - surface: api
  worker:docker:
    intent: packaged_runtime
    description: Standalone Docker worker workflow for queue scaling
    notes: |
      This follows `docker/worker/README.md` worker startup path.
    prepare:
      task: setup:env:worker
    run:
      task: dev:docker:worker
    readiness:
      surfaces:
        - worker
    exposes:
      - surface: worker
checks:
  - name: workspace-dependencies-installed
    kind: file
    severity: error
    path: node_modules/.modules.yaml
    expect: file
    timeout: 10000
  - name: server-env-configured
    kind: file
    severity: error
    path: packages/server/.env
    expect: file
    timeout: 10000
  - name: ui-env-configured
    kind: file
    severity: error
    path: packages/ui/.env
    expect: file
    timeout: 10000
  - name: docker-env-configured
    kind: file
    severity: error
    path: docker/.env
    expect: file
    timeout: 10000
  - name: worker-env-configured
    kind: file
    severity: error
    path: docker/worker/.env
    expect: file
    timeout: 10000
agent:
  posture: readiness_strict
  entrypoint: install
  default_task: test:coverage
  safe_tasks: []
  verify_after_changes: []
  writable_paths:
    - packages
    - docker
    - package.json
    - turbo.json
  protected_paths:
    - .env
    - packages/server/.env
    - packages/ui/.env
    - docker/.env
    - docker/worker/.env
    - .github/workflows
    - pnpm-lock.yaml
    - pnpm-workspace.yaml
    - ota.yaml
  bootstrap:
    ota:
      note: Install ota when missing so contributors and agents can run the readiness workflows declared in this contract.
      sh: curl -fsSL https://dist.ota.run/install.sh | OTA_VERSION=v1.6.16 sh
      powershell: $env:OTA_VERSION='v1.6.16'; irm https://dist.ota.run/install.ps1 | iex
  notes: |
    Use `ota tasks --use .` to list runnable tasks and review the agent-safe surface before execution.
    Use `ota run setup:env:server .`, `ota run setup:env:docker .`, and
    `ota run setup:env:worker .` to create env files from templates only when missing.
    Use `ota up --workflow app --native .` for contributor development.
    Use `ota up --workflow app:prod --native .` for local built startup validation.
    Use `ota up --workflow verify --native .` for CI-equivalent verification.
    Use `ota up --workflow verify --container .` for the containerized CI-equivalent verify path.
    Use `ota up --workflow app:docker --native .`, `ota up --workflow app:docker:queue --native .`,
    and `ota up --workflow worker:docker --native .` for documented compose runtime paths.
    No tasks are agent-safe by default in this slice.
